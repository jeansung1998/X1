dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#080808"
  adaptive_icon_foreground: "icon.png"

flutter:
  uses-material-design: true