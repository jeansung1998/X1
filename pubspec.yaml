name: x1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.2.0
  supabase_flutter: ^2.8.4
  cached_network_image: ^3.4.1
  in_app_purchase: ^3.2.0
  shared_preferences: ^2.3.0
  dio: ^5.7.0
